<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background-color: #1E1E1E; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<script>
    // Configurazione aggiornata senza claw (3 DOF attivi + Base)
    const ROBOT_CONFIG = [
        {
            fileName: 'BaseArm-Body.stl',
            jointPos: { x: 0, y: 0, z: 0 }, meshOffset: { x: 0, y: 0, z: 0 }, meshRotation: { x: 0, y: 0, z: 0 },
            rotationAxis: 'y', rotationDirection: 1, angleOffset: 0, parent: -1
        },
        {
            fileName: 'Arm2_final.stl',
            jointPos: { x: 0, y: 100, z: 0 }, meshOffset: { x: -10, y: -10, z: 0 }, meshRotation: { x: 270, y: 0, z: 0 },
            rotationAxis: 'y', rotationDirection: 1, angleOffset: 0, parent: 0
        },
        {
            fileName: 'Arm3_final.stl',
            jointPos: { x: 20, y: 30, z: 0 }, meshOffset: { x: 0, y: 0, z: 86 }, meshRotation: { x: 0, y: 90, z: 0 },
            rotationAxis: 'x', rotationDirection: -1, angleOffset: 0, parent: 1
        },
        {
            fileName: 'Arm4.stl',
            jointPos: { x: 0, y: 0, z: 200 }, meshOffset: { x: 0, y: -25, z: 15 }, meshRotation: { x: 0, y: 90, z: 40 },
            rotationAxis: 'x', rotationDirection: -1, angleOffset: 0, parent: 2
        }
    ];

    let scene, camera, renderer, controls;
    const joints = [];
    const materials = [];
    const CAMERA_ORBIT_RADIUS = 600;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1E1E1E);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 300, CAMERA_ORBIT_RADIUS);
        camera.lookAt(0, 100, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Aggiunta OrbitControls per ispezione visiva 3D
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 100, 0); // Sposta il centro di rotazione dell'orbita al centro del robot

        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);
        const dirLight1 = new THREE.DirectionalLight(0xFFFFFF, 0.8);
        dirLight1.position.set(200, 400, 200);
        scene.add(dirLight1);

        const gridHelper = new THREE.GridHelper(400, 40, 0x444444, 0x222222);
        gridHelper.position.y = -10;
        scene.add(gridHelper);

        const defaultMaterial = new THREE.MeshPhongMaterial({ color: 0x00E5FF, specular: 0x111111, shininess: 100 });
        const loader = new THREE.STLLoader();

        for (let i = 0; i < ROBOT_CONFIG.length; i++) {
            const cfg = ROBOT_CONFIG[i];
            joints[i] = new THREE.Group();
            joints[i].position.set(cfg.jointPos.x, cfg.jointPos.y, cfg.jointPos.z);

            if (cfg.parent === -1) {
                scene.add(joints[i]);
            } else {
                joints[cfg.parent].add(joints[i]);
            }

            materials[i] = defaultMaterial;

            const url = "https://appassets.androidplatform.net/assets/" + cfg.fileName;
            loadSTLPart(loader, url, i);
        }

        animate();
    }

    function loadSTLPart(loader, url, index) {
        loader.load(url, function (geometry) {
            geometry.computeVertexNormals();
            geometry.center();

            const mesh = new THREE.Mesh(geometry, materials[index]);
            mesh.name = "mesh_" + index;
            const cfg = ROBOT_CONFIG[index];

            mesh.position.set(cfg.meshOffset.x, cfg.meshOffset.y, cfg.meshOffset.z);
            mesh.rotation.set(
                cfg.meshRotation.x * (Math.PI / 180),
                cfg.meshRotation.y * (Math.PI / 180),
                cfg.meshRotation.z * (Math.PI / 180)
            );

            joints[index].add(mesh);
        }, undefined, function (error) {
            console.error("Errore STLLoader sul nodo " + index, error);
        });
    }

    // Endpoint JNI per i controller di calibrazione dinamica
    window.updateJointConfig = function(index, type, axis, value) {
        const cfg = ROBOT_CONFIG[index];
        cfg[type][axis] = value;

        if (type === 'jointPos') {
            joints[index].position.set(cfg.jointPos.x, cfg.jointPos.y, cfg.jointPos.z);
        } else if (type === 'meshOffset') {
            const mesh = joints[index].getObjectByName("mesh_" + index);
            if (mesh) {
                mesh.position.set(cfg.meshOffset.x, cfg.meshOffset.y, cfg.meshOffset.z);
            }
        } else if (type === 'meshRotation') {
            const mesh = joints[index].getObjectByName("mesh_" + index);
            if (mesh) {
                mesh.rotation.set(
                    cfg.meshRotation.x * (Math.PI / 180),
                    cfg.meshRotation.y * (Math.PI / 180),
                    cfg.meshRotation.z * (Math.PI / 180)
                );
            }
        }
    };

    // Routing dell'attuatore verso l'indice cinematico corretto
    window.updateJointAngle = function(motorIndex, angleDegree) {
        if (motorIndex === 0) applyRotation(1, angleDegree);
        else if (motorIndex === 1) applyRotation(2, angleDegree);
        else if (motorIndex === 2) applyRotation(3, angleDegree);
    };

    function applyRotation(nodeIndex, rawAngle) {
        const cfg = ROBOT_CONFIG[nodeIndex];
        const calibratedAngle = rawAngle + (cfg.angleOffset || 0);
        const targetRad = (calibratedAngle * (Math.PI / 180.0)) * cfg.rotationDirection;

        const targetGroup = joints[nodeIndex];

        targetGroup.rotation.x = 0;
        targetGroup.rotation.y = 0;
        targetGroup.rotation.z = 0;

        if (cfg.rotationAxis === 'x') targetGroup.rotation.x = targetRad;
        if (cfg.rotationAxis === 'y') targetGroup.rotation.y = targetRad;
        if (cfg.rotationAxis === 'z') targetGroup.rotation.z = targetRad;
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update(); // Intercetta input hardware per orientare la telecamera
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
